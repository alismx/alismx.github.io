name: trivy

on: [pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Trivy
        run: |
          wget -q https://github.com/aquasecurity/trivy/releases/download/v0.58.0/trivy_0.58.0_Linux-64bit.tar.gz
          tar -xzf trivy_0.58.0_Linux-64bit.tar.gz
          mv trivy /usr/local/bin/trivy

      - name: Run Trivy vulnerability scanner
        run: |
          trivy fs --severity HIGH,CRITICAL --format sarif -o trivy-results.sarif .

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
